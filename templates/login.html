<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bible Study Arcade - Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121214; color: #fff; text-align: center; padding-top: 100px; }
        .login-card { background: #1c1c1f; max-width: 400px; margin: 0 auto; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); border: 1px solid #2d2d30; }
        h1 { margin-bottom: 30px; color: #ffca28; }
        select, input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #3a3a3c; background: #2a2a2e; color: white; box-sizing: border-box; font-size: 16px; }
        button { background: #ffca28; color: #121214; font-weight: bold; border: none; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        button:hover { background: #ffe082; }
    </style>
</head>
<body>

<div class="login-card">
    <h1>⚔️ Sword Drill Arcade</h1>
    <form id="loginForm">
        <label for="role">Choose Your Portal:</label>
        <select name="role" id="role">
            <option value="student">Student Dashboard</option>
            <option value="parent">Parent Portal</option>
            <option value="admin">Liam (Admin)</option>
        </select>

        <label for="password" style="display:block; margin-top: 15px; text-align: left;">Passcode:</label>
        <input type="password" name="password" id="password" required placeholder="Enter password...">

        <button type="submit">ENTER ARCADE</button>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Stop page from redirecting
        
        const formData = new FormData(this);
        
        fetch('/login', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                // Password correct! Go to portal
                window.location.href = data.redirect_url;
            } else {
                // Password wrong! Pop up alert window smoothly
                alert("❌ " + data.message);
                document.getElementById('password').value = ''; // Clear input field
            }
        })
        .catch(err => console.error("Error:", err));
    });
</script>

</body>
</html>
