<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Sanctum Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-container { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 420px; padding: 35px 25px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; }
        h1 { color: #38bdf8; font-size: 2rem; margin-bottom: 8px; font-weight: 800; letter-spacing: -0.5px; }
        p { color: #94a3b8; font-size: 0.95rem; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: #cbd5e1; font-weight: 600; font-size: 0.85rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        select, input { width: 100%; padding: 14px 16px; background: #0f172a; border: 2px solid #334155; border-radius: 12px; color: white; font-size: 1rem; outline: none; transition: all 0.2s; -webkit-appearance: none; }
        select:focus, input:focus { border-color: #38bdf8; box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15); }
        .btn-submit { width: 100%; background: linear-gradient(135deg, #38bdf8, #2563eb); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: transform 0.1s, opacity 0.2s; margin-top: 10px; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        .btn-submit:active { transform: scale(0.98); opacity: 0.95; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Family Bible App</h1>
        <p>Access your customized learning hub</p>
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="role">Select Profile Role</label>
                <select name="role" id="role">
                    <option value="student">⚔️ Student Portal</option>
                    <option value="parent">🏡 Parent Insights</option>
                    <option value="admin">🛠️ Command Console</option>
                </select>
            </div>
            <div class="form-group">
                <label for="password">Security Passcode</label>
                <input type="password" name="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-submit">Authenticate →</button>
        </form>
    </div>
</body>
</html>
