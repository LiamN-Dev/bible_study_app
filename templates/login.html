<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Terminal Entrance</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1e293b; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        h1 { margin-bottom: 1.5rem; font-size: 1.75rem; color: #38bdf8; }
        select, input, button { width: 100%; padding: 0.75rem; margin-bottom: 1.25rem; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; font-size: 1rem; box-sizing: border-box; }
        button { background: #2563eb; font-weight: bold; cursor: pointer; border: none; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        .err-msg { color: #f87171; display: none; margin-bottom: 1rem; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>⚔️ Bible Study App</h1>
        <div id="errorBox" class="err-msg"></div>
        <form id="loginForm">
            <label style="display:block; text-align:left; margin-bottom:0.5rem; font-size:0.9rem; color:#94a3b8;">Choose Portal Role:</label>
            <select name="role">
                <option value="student">Student Portal</option>
                <option value="parent">Parent Dashboard</option>
                <option value="admin">Admin Commander Room</option>
            </select>
            <input type="password" name="password" placeholder="Enter Security Key Passcode" required>
            <button type="submit">Unlock System Access</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errBox = document.getElementById('errorBox');
            errBox.style.display = 'none';
            
            const formData = new FormData(e.target);
            const response = await fetch('/login', { method: 'POST', body: formData });
            const data = await response.json();
            
            if (data.success) {
                window.location.href = data.redirect_url;
            } else {
                errBox.textContent = data.message;
                errBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
