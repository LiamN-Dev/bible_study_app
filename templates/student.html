<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Campaign Hub</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0f172a; color: #f8fafc; max-width: 650px; margin: 0 auto; padding: 15px; }
        .hero-box { background: linear-gradient(135deg, #1e3a8a, #3b82f6); padding: 25px 20px; border-radius: 16px; margin-bottom: 20px; text-align: center; }
        .stat-card { background: #1e293b; border: 1px solid #334155; padding: 15px; border-radius: 12px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="hero-box">
        <span style="text-transform:uppercase; font-size:0.8rem; font-weight:bold; background:#1d4ed8; padding:4px 10px; border-radius:20px;">Active Target Mission</span>
        <h1 style="margin:5px 0 0 0; font-size:1.5rem;">{{ day['title'] }}</h1>
    </div>

    <div class="stat-card" style="border-left: 5px solid #38bdf8;">
        <h3 style="margin-top:0; color:#38bdf8;">📜 Today's Verse</h3>
        <p style="font-size:1.1rem; line-height:1.4;">{{ day['verse'] }}</p>
    </div>

    <div class="stat-card">
        <h3 style="margin-top:0; color:#fbbf24;">🛡️ Hero Profile: {{ day['character_name'] }}</h3>
        <ul>
            {% for fact in facts %}
                <li>{{ fact['fact_text'] }}</li>
            {% endfor %}
        </ul>
    </div>

    <div class="stat-card" style="border-left: 5px solid #10b981; background:#064e3b;">
        <h3 style="margin-top:0; color:#34d399;">🚀 Daily Action Mission</h3>
        <p>{{ day['kids_mission'] }}</p>
    </div>
</body>
</html>
