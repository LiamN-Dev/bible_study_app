<h2>🛠️ Master Release Pipeline</h2>
{% for day in days %}
    <div style="background: #334155; padding: 15px; margin-bottom: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center;">
        <div>
            <strong>{{ day['title'] }}</strong> - <span>{{ '🔒 Locked' if day['is_locked'] else '✅ Unlocked' }}</span>
            {% if day['request_pending'] %}
                <span style="color: #f59e0b; margin-left: 10px; font-weight:bold;">(Parent Requested Access!)</span>
            {% endif %}
        </div>
        <div>
            {% if day['is_locked'] %}
                <form action="{{ url_for('unlock_day', day_id=day['id']) }}" method="POST">
                    <button type="submit" style="background:#22c55e; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer;">Unlock / Approve</button>
                </form>
            {% else %}
                <form action="{{ url_for('lock_day', day_id=day['id']) }}" method="POST">
                    <button type="submit" style="background:#64748b; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer;">Re-Lock</button>
                </form>
            {% endif %}
        </div>
    </div>
{% endfor %}
