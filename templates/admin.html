<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Control Panel</title>
</head>
<body style="font-family: sans-serif; background-color: #1e1e24; color: #f5f5f5; padding: 30px;">

    <h1>Liam's Teacher Control Panel</h1>
    <a href="/" style="color: #61afef;">Log Out</a>
    <hr style="border-color: #444;">

    <h2>Today's Teaching Flow & Notes:</h2>
    <ul>
        {% for note in data.liam_notes %}
            <li style="margin-bottom: 12px; font-size: 18px; line-height: 1.5;">{{ note }}</li>
        {% endfor %}
    </ul>

    <div style="background-color: #2d3139; padding: 15px; border-radius: 6px; margin-top: 30px;">
        <h3>Quick Reference of what the Kids see:</h3>
        <p><strong>Verse:</strong> {{ data.verse }}</p>
        <p><strong>Character:</strong> {{ data.character_name }}</p>
    </div>

</body>
</html>
